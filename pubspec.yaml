name: employee_attendance_app
description: Employee Check In Check Out Web App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Database
  supabase_flutter: ^2.8.0

  # UI
  google_fonts: ^6.2.1

  # Date Time
  intl: ^0.20.2

  # Camera / Image
  image_picker: ^1.1.2
  image: ^4.2.0
  path_provider: ^2.1.5
  geolocator: ^12.0.0

  # Alert
  fluttertoast: ^8.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/